# Run the starter app locally with a single command:
#   docker compose up --build
services:
  web:
    build: .
    image: starter-app:latest
    container_name: starter-app
    ports:
      # host:container — only one application port is exposed.
      - "8080:8080"
    environment:
      APP_NAME: starter-app
      APP_VERSION: "1.0.0"
      GREETING: "Hello, world!"
    # Restart on failure to make local troubleshooting easier.
    restart: unless-stopped
    # Container-level health check hitting the /health route.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
